name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.25.3"
  REGISTRY: ghcr.io
  IMAGE_NAME: 6kmfi6hp/xrayr

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [windows, freebsd, openbsd, linux, darwin]
        goarch: [amd64, 386]
        exclude:
          - goos: darwin
            goarch: 386
          - goos: openbsd
            goarch: 386
        include:
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: linux
            goarch: arm
            goarm: 6
          - goos: linux
            goarch: arm
            goarm: 5
          - goos: android
            goarch: arm64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: riscv64
          - goos: linux
            goarch: mips64
          - goos: linux
            goarch: mips64le
          - goos: linux
            goarch: mipsle
          - goos: linux
            goarch: mips
          - goos: linux
            goarch: ppc64le
          - goos: freebsd
            goarch: arm64
          - goos: freebsd
            goarch: arm
            goarm: 7
          - goos: linux
            goarch: s390x

    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: "0"

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Resolve release asset name
        id: asset
        run: |
          key="${GOOS}-${GOARCH}${GOARM:-}${GOMIPS:-}"
          name="$(jq -r --arg key "$key" '.[$key].friendlyName // empty' .github/build/friendly-filenames.json)"
          if [ -z "$name" ]; then
            echo "No friendly filename for $key" >&2
            exit 1
          fi
          echo "ASSET_NAME=$name" >> "$GITHUB_OUTPUT"
          echo "ASSET_NAME=$name" >> "$GITHUB_ENV"
          echo "Resolved $key to $name"

      - name: Download dependencies
        run: go mod download

      - name: Build release package
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
        run: scripts/package-release.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: XrayR-${{ steps.asset.outputs.ASSET_NAME }}
          path: |
            XrayR-${{ steps.asset.outputs.ASSET_NAME }}/*
            dist/XrayR-${{ steps.asset.outputs.ASSET_NAME }}.zip
            dist/XrayR-${{ steps.asset.outputs.ASSET_NAME }}.zip.dgst

  publish:
    runs-on: ubuntu-latest
    needs:
      - build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: XrayR-*
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/dist/XrayR-*.zip
            release-assets/dist/XrayR-*.zip.dgst
          generate_release_notes: true
          fail_on_unmatched_files: true

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - publish
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_id: linux-amd64
          - platform: linux/arm/v6
            platform_id: linux-arm-v6
          - platform: linux/arm/v7
            platform_id: linux-arm-v7
          - platform: linux/arm64
            platform_id: linux-arm64
          - platform: linux/s390x
            platform_id: linux-s390x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform_id }}
          cache-to: type=gha,scope=${{ matrix.platform_id }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_id }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    runs-on: ubuntu-latest
    needs:
      - docker-build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
